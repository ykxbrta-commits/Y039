            align-items: center;

        .loader {

            border-radius: 50%;

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    <div class="loader"></div>
    <p style="margin-left: 10px; font-size: 14px; color: #666;">Loading...</p>
